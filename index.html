<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoetraNuri.com - Enterprise Warehouse ERP</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Icons & Charts -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .dark .glass { background: rgba(15, 23, 42, 0.7); }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- MOCK DATA & HELPERS ---
        const formatIDR = (val) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(val);

        // --- COMPONENTS ---
        const Card = ({ children, className = "" }) => (
            <div className={`bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 p-5 ${className}`}>
                {children}
            </div>
        );

        const Badge = ({ children, color = "blue" }) => {
            const variants = {
                blue: "bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400",
                emerald: "bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400",
                amber: "bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400",
                rose: "bg-rose-100 text-rose-700 dark:bg-rose-900/30 dark:text-rose-400",
                purple: "bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-400"
            };
            return <span className={`px-2.5 py-1 rounded-lg text-[10px] font-bold uppercase tracking-wider ${variants[color] || variants.blue}`}>{children}</span>;
        };

        // --- CHART COMPONENT ---
        const CombinedChart = ({ type = 'line', data, labels }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                const ctx = chartRef.current.getContext('2d');
                if (chartInstance.current) chartInstance.current.destroy();
                chartInstance.current = new Chart(ctx, {
                    type,
                    data: {
                        labels,
                        datasets: data.map(d => ({
                            ...d,
                            tension: 0.4,
                            borderWidth: 2,
                            pointRadius: 3
                        }))
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, font: { size: 10 } } } },
                        scales: { y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.03)' } }, x: { grid: { display: false } } }
                    }
                });
                return () => chartInstance.current?.destroy();
            }, [data, labels, type]);

            return <canvas ref={chartRef}></canvas>;
        };

        // --- VIEW: DASHBOARD ---
        const DashboardView = () => (
            <div className="space-y-6 fade-in">
                <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4">
                    <Card className="border-b-4 border-blue-500">
                        <p className="text-[10px] text-slate-500 font-bold uppercase">Total Produk</p>
                        <h3 className="text-xl font-black dark:text-white">4,281</h3>
                    </Card>
                    <Card className="border-b-4 border-emerald-500">
                        <p className="text-[10px] text-slate-500 font-bold uppercase">Masuk Hari Ini</p>
                        <h3 className="text-xl font-black text-emerald-600">+142</h3>
                    </Card>
                    <Card className="border-b-4 border-rose-500">
                        <p className="text-[10px] text-slate-500 font-bold uppercase">Keluar Hari Ini</p>
                        <h3 className="text-xl font-black text-rose-600">-89</h3>
                    </Card>
                    <Card className="border-b-4 border-amber-500">
                        <p className="text-[10px] text-slate-500 font-bold uppercase">Stok Menipis</p>
                        <h3 className="text-xl font-black text-amber-500">14</h3>
                    </Card>
                    <Card className="border-b-4 border-indigo-500">
                        <p className="text-[10px] text-slate-500 font-bold uppercase">Total Supplier</p>
                        <h3 className="text-xl font-black dark:text-white">82</h3>
                    </Card>
                    <Card className="border-b-4 border-purple-500">
                        <p className="text-[10px] text-slate-500 font-bold uppercase">Total Customer</p>
                        <h3 className="text-xl font-black dark:text-white">1.2K</h3>
                    </Card>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <Card className="lg:col-span-2 h-[400px]">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="font-bold dark:text-white">Analisis Performa Gudang</h3>
                            <Badge color="emerald">Realtime Update</Badge>
                        </div>
                        <div className="h-[300px]">
                            <CombinedChart 
                                type="line"
                                labels={['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun']}
                                data={[
                                    { label: 'Penjualan', data: [45, 52, 48, 70, 65, 85], borderColor: '#3b82f6', backgroundColor: 'transparent' },
                                    { label: 'Stok Opname', data: [30, 40, 35, 50, 45, 60], borderColor: '#10b981', backgroundColor: 'transparent' }
                                ]}
                            />
                        </div>
                    </Card>
                    <div className="space-y-4">
                        <Card>
                            <h4 className="font-bold text-sm mb-4 dark:text-white">Notifikasi AI & Stok</h4>
                            <div className="space-y-3">
                                <div className="flex gap-3 p-2 bg-amber-50 dark:bg-amber-900/10 rounded-lg border border-amber-100 dark:border-amber-900/20">
                                    <i data-lucide="alert-triangle" className="w-4 h-4 text-amber-500 shrink-0"></i>
                                    <p className="text-xs text-amber-800 dark:text-amber-200"><b>Stok Kritis:</b> MacBook Pro M3 sisa 2 unit. Prediksi habis dalam 2 hari.</p>
                                </div>
                                <div className="flex gap-3 p-2 bg-blue-50 dark:bg-blue-900/10 rounded-lg border border-blue-100 dark:border-blue-900/20">
                                    <i data-lucide="sparkles" className="w-4 h-4 text-blue-500 shrink-0"></i>
                                    <p className="text-xs text-blue-800 dark:text-blue-200"><b>Smart Suggest:</b> Segera restock Monitor Dell. Supplier "Mega Tech" sedang promo 10%.</p>
                                </div>
                            </div>
                        </Card>
                        <Card className="flex-1">
                            <h4 className="font-bold text-sm mb-4 dark:text-white">Aktivitas Terbaru</h4>
                            <div className="space-y-4 max-h-[140px] overflow-y-auto custom-scrollbar pr-2">
                                {[
                                    { msg: "Staff Budi melakukan stok masuk PN-001", time: "2m ago" },
                                    { msg: "Sales Order #INV-882 disetujui", time: "15m ago" },
                                    { msg: "Transfer gudang B ke gudang A", time: "1h ago" }
                                ].map((act, i) => (
                                    <div key={i} className="flex justify-between items-start gap-2 text-[11px]">
                                        <span className="text-slate-600 dark:text-slate-400">• {act.msg}</span>
                                        <span className="text-slate-400 shrink-0 italic">{act.time}</span>
                                    </div>
                                ))}
                            </div>
                        </Card>
                    </div>
                </div>
            </div>
        );

        // --- VIEW: MASTER DATA ---
        const MasterDataView = () => (
            <div className="space-y-6 fade-in">
                <div className="flex flex-col md:flex-row justify-between gap-4">
                    <div className="relative flex-1 max-w-md">
                        <i data-lucide="search" className="absolute left-3 top-3 w-4 h-4 text-slate-400"></i>
                        <input type="text" placeholder="Cari SKU, Nama, atau Barcode..." className="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 dark:bg-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-blue-500 text-sm" />
                    </div>
                    <div className="flex gap-2">
                        <button className="px-4 py-2 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-xl text-sm font-bold flex items-center gap-2">
                            <i data-lucide="download" className="w-4 h-4"></i> Export
                        </button>
                        <button className="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-blue-700 transition-colors">
                            <i data-lucide="plus" className="w-4 h-4"></i> Tambah Barang
                        </button>
                    </div>
                </div>
                
                <Card className="overflow-hidden">
                    <div className="overflow-x-auto">
                        <table className="w-full text-left">
                            <thead className="bg-slate-50 dark:bg-slate-800/50">
                                <tr className="text-slate-500 text-[11px] uppercase tracking-wider">
                                    <th className="p-4 font-bold">Produk & SKU</th>
                                    <th className="p-4 font-bold">Kategori</th>
                                    <th className="p-4 font-bold">Harga Modal/Jual</th>
                                    <th className="p-4 font-bold">Stok/Gudang</th>
                                    <th className="p-4 font-bold">Barcode</th>
                                    <th className="p-4 font-bold">Aksi</th>
                                </tr>
                            </thead>
                            <tbody className="text-sm">
                                {[
                                    { sku: "PN-ELE-001", name: "Laptop ASUS ROG", cat: "Elektronik", cost: 15000000, price: 18500000, stock: 45, wh: "Gudang Utama", code: "7890123" },
                                    { sku: "PN-ACC-042", name: "Mouse Logitech MX", cat: "Aksesoris", cost: 800000, price: 1250000, stock: 120, wh: "Gudang B", code: "4455667" },
                                    { sku: "PN-FUR-099", name: "Kursi Gaming SecretLab", cat: "Furniture", cost: 5000000, price: 7200000, stock: 5, wh: "Gudang Utama", code: "1122334" },
                                ].map((item, i) => (
                                    <tr key={i} className="border-b border-slate-50 dark:border-slate-800/50 hover:bg-slate-50/50 dark:hover:bg-slate-800/30">
                                        <td className="p-4">
                                            <div className="font-bold dark:text-white">{item.name}</div>
                                            <div className="text-[10px] font-mono text-slate-400 uppercase tracking-tighter">{item.sku}</div>
                                        </td>
                                        <td className="p-4">
                                            <Badge color="blue">{item.cat}</Badge>
                                        </td>
                                        <td className="p-4">
                                            <div className="text-xs text-slate-400 line-through">{formatIDR(item.cost)}</div>
                                            <div className="font-bold text-emerald-600">{formatIDR(item.price)}</div>
                                        </td>
                                        <td className="p-4">
                                            <div className="dark:text-white font-medium">{item.stock} Unit</div>
                                            <div className="text-[10px] text-slate-500">{item.wh}</div>
                                        </td>
                                        <td className="p-4">
                                            <div className="w-16 h-8 bg-slate-100 dark:bg-slate-800 rounded flex items-center justify-center border border-dashed border-slate-300 dark:border-slate-600">
                                                <i data-lucide="barcode" className="w-6 h-6 text-slate-400"></i>
                                            </div>
                                        </td>
                                        <td className="p-4">
                                            <div className="flex gap-1">
                                                <button className="p-1.5 text-slate-400 hover:text-blue-500 transition-colors"><i data-lucide="eye" className="w-4 h-4"></i></button>
                                                <button className="p-1.5 text-slate-400 hover:text-amber-500 transition-colors"><i data-lucide="edit-3" className="w-4 h-4"></i></button>
                                                <button className="p-1.5 text-slate-400 hover:text-rose-500 transition-colors"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </Card>
            </div>
        );

        // --- VIEW: STOK MANAGEMENT ---
        const StockView = () => (
            <div className="space-y-6 fade-in">
                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <Card className="flex items-center gap-4 cursor-pointer hover:border-blue-500 transition-all">
                        <div className="w-12 h-12 rounded-xl bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-600"><i data-lucide="arrow-down-left"></i></div>
                        <div><p className="text-xs font-bold text-slate-500 uppercase">Stok Masuk</p><p className="text-xs text-slate-400">Restock Barang</p></div>
                    </Card>
                    <Card className="flex items-center gap-4 cursor-pointer hover:border-rose-500 transition-all">
                        <div className="w-12 h-12 rounded-xl bg-rose-100 dark:bg-rose-900/30 flex items-center justify-center text-rose-600"><i data-lucide="arrow-up-right"></i></div>
                        <div><p className="text-xs font-bold text-slate-500 uppercase">Stok Keluar</p><p className="text-xs text-slate-400">Pengiriman Barang</p></div>
                    </Card>
                    <Card className="flex items-center gap-4 cursor-pointer hover:border-amber-500 transition-all">
                        <div className="w-12 h-12 rounded-xl bg-amber-100 dark:bg-amber-900/30 flex items-center justify-center text-amber-600"><i data-lucide="clipboard-check"></i></div>
                        <div><p className="text-xs font-bold text-slate-500 uppercase">Stok Opname</p><p className="text-xs text-slate-400">Audit Fisik</p></div>
                    </Card>
                    <Card className="flex items-center gap-4 cursor-pointer hover:border-purple-500 transition-all">
                        <div className="w-12 h-12 rounded-xl bg-purple-100 dark:bg-purple-900/30 flex items-center justify-center text-purple-600"><i data-lucide="git-compare"></i></div>
                        <div><p className="text-xs font-bold text-slate-500 uppercase">Transfer</p><p className="text-xs text-slate-400">Antar Gudang</p></div>
                    </Card>
                </div>
                
                <div className="flex gap-4">
                    <Card className="flex-1">
                        <h3 className="font-bold mb-4 dark:text-white flex items-center gap-2">
                            <i data-lucide="history" className="w-4 h-4 text-slate-400"></i> Mutasi Barang Terbaru (FIFO)
                        </h3>
                        <div className="space-y-4">
                            {[1,2,3,4].map(i => (
                                <div key={i} className="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-100 dark:border-slate-800">
                                    <div className="flex items-center gap-3">
                                        <div className={`w-2 h-10 rounded-full ${i % 2 === 0 ? 'bg-emerald-500' : 'bg-rose-500'}`}></div>
                                        <div>
                                            <p className="text-xs font-bold dark:text-white">ASUS ROG Zephyrus G14</p>
                                            <p className="text-[10px] text-slate-500 italic">Oleh: Admin Darmawan • Ref: #TRX-9921</p>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <p className={`font-black ${i % 2 === 0 ? 'text-emerald-600' : 'text-rose-600'}`}>{i % 2 === 0 ? '+' : '-'} {i * 5}</p>
                                        <p className="text-[10px] text-slate-400 font-mono">14:20:01</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </Card>
                    <Card className="w-80 flex flex-col items-center justify-center text-center gap-4 bg-gradient-to-br from-blue-600 to-indigo-700 text-white border-none shadow-xl">
                        <div className="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center animate-pulse">
                            <i data-lucide="scan" className="w-10 h-10"></i>
                        </div>
                        <div>
                            <h4 className="font-bold">Scan Barcode</h4>
                            <p className="text-xs text-blue-100 px-4">Gunakan kamera untuk input stok masuk/keluar otomatis secara realtime.</p>
                        </div>
                        <button className="px-6 py-2 bg-white text-blue-700 rounded-xl font-bold text-sm shadow-lg">Buka Kamera</button>
                    </Card>
                </div>
            </div>
        );

        // --- VIEW: FINANCE ---
        const FinanceView = () => (
            <div className="space-y-6 fade-in">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <Card className="bg-emerald-600 text-white border-none shadow-lg">
                        <p className="text-xs font-bold text-emerald-100 uppercase">Pemasukan Bulan Ini</p>
                        <h2 className="text-3xl font-black mt-2">{formatIDR(1245000000)}</h2>
                        <div className="mt-4 flex items-center gap-2 text-xs text-emerald-200">
                            <i data-lucide="trending-up" className="w-3 h-3"></i> +12% dari bulan lalu
                        </div>
                    </Card>
                    <Card className="bg-rose-600 text-white border-none shadow-lg">
                        <p className="text-xs font-bold text-rose-100 uppercase">Pengeluaran Bulan Ini</p>
                        <h2 className="text-3xl font-black mt-2">{formatIDR(450200000)}</h2>
                        <div className="mt-4 flex items-center gap-2 text-xs text-rose-200">
                            <i data-lucide="trending-down" className="w-3 h-3"></i> -5% efisiensi operasional
                        </div>
                    </Card>
                    <Card className="bg-slate-900 text-white border-none shadow-lg">
                        <p className="text-xs font-bold text-slate-400 uppercase">Net Profit (Laba Bersih)</p>
                        <h2 className="text-3xl font-black mt-2 text-blue-400">{formatIDR(794800000)}</h2>
                        <div className="mt-4 flex items-center gap-2 text-xs text-slate-400">
                            <i data-lucide="wallet" className="w-3 h-3"></i> Tersebar di 3 Rekening Bank
                        </div>
                    </Card>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <Card className="h-[350px]">
                        <h3 className="font-bold mb-4 dark:text-white">Cash Flow Analysis</h3>
                        <div className="h-[250px]">
                            <CombinedChart 
                                type="bar"
                                labels={['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min']}
                                data={[
                                    { label: 'Debit', data: [120, 190, 300, 500, 200, 300, 450], backgroundColor: '#10b981' },
                                    { label: 'Kredit', data: [80, 150, 120, 200, 150, 210, 100], backgroundColor: '#f43f5e' }
                                ]}
                            />
                        </div>
                    </Card>
                    <Card>
                        <div className="flex justify-between mb-4">
                            <h3 className="font-bold dark:text-white">Jurnal Transaksi Terbaru</h3>
                            <button className="text-blue-500 text-xs font-bold">Lihat Semua</button>
                        </div>
                        <div className="space-y-3">
                            {[
                                { title: "Penjualan INV-902", category: "Sales", amount: 15000000, type: "plus" },
                                { title: "Restock PN-012", category: "Purchase", amount: -8000000, type: "minus" },
                                { title: "Biaya Listrik Gudang", category: "Utility", amount: -1200000, type: "minus" },
                                { title: "Penerimaan PO-881", category: "Income", amount: 25000000, type: "plus" }
                            ].map((tx, i) => (
                                <div key={i} className="flex justify-between items-center p-2.5 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-lg transition-colors">
                                    <div className="flex gap-3">
                                        <div className={`w-10 h-10 rounded-lg flex items-center justify-center ${tx.type === 'plus' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                            <i data-lucide={tx.type === 'plus' ? 'arrow-down-left' : 'arrow-up-right'} className="w-5 h-5"></i>
                                        </div>
                                        <div>
                                            <p className="text-xs font-bold dark:text-white">{tx.title}</p>
                                            <p className="text-[10px] text-slate-500 uppercase">{tx.category}</p>
                                        </div>
                                    </div>
                                    <p className={`text-sm font-black ${tx.type === 'plus' ? 'text-emerald-600' : 'text-rose-600'}`}>
                                        {tx.type === 'plus' ? '+' : '-'} {formatIDR(Math.abs(tx.amount))}

                        </div>

                </div>
            </div>
        );

        // --- VIEW: EMPLOYEES / HR ---
        const EmployeeView = () => (
            <div className="space-y-6 fade-in">
                <div className="flex justify-between items-center">
                    <h3 className="text-xl font-bold dark:text-white">Sumber Daya Manusia</h3>
                    <div className="flex gap-2">
                         <button className="px-4 py-2 bg-emerald-600 text-white rounded-xl text-sm font-bold flex items-center gap-2"><i data-lucide="clock" className="w-4 h-4"></i> Rekap Absensi</button>
                         <button className="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold flex items-center gap-2"><i data-lucide="plus" className="w-4 h-4"></i> Karyawan Baru</button>
                    </div>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                    {[
                        { name: "Ahmad Darmawan", pos: "Kepala Gudang", div: "Operasional", status: "Hadir", img: "AD" },
                        { name: "Siti Aminah", pos: "Admin Keuangan", div: "Finance", status: "Hadir", img: "SA" },
                        { name: "Budi Santoso", pos: "Staff Gudang", div: "Operasional", status: "Izin", img: "BS" },
                        { name: "Dewi Lestari", pos: "Data Analyst", div: "IT/AI", status: "Hadir", img: "DL" },
                    ].map((emp, i) => (
                        <Card key={i} className="text-center group hover:border-blue-500 transition-all cursor-pointer">
                            <div className="w-16 h-16 rounded-2xl bg-gradient-to-tr from-slate-200 to-slate-100 dark:from-slate-800 dark:to-slate-700 mx-auto flex items-center justify-center text-xl font-black text-slate-500 dark:text-slate-400 mb-4 group-hover:from-blue-500 group-hover:to-indigo-600 group-hover:text-white transition-all">
                                {emp.img}
                            </div>
                            <h4 className="font-bold dark:text-white">{emp.name}</h4>
